<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicharronera Liberiana</title>
    <style>
        .productos {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .producto {
            width: 30%;
            margin: 10px;
            text-align: center;
        }
        .producto img {
            width: 100%;
            border-radius: 10px;
        }
        .precio {
            font-weight: bold;
        }
        .boton-carrito {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chicharronera Liberiana</h1>
        <nav>
            <a href="                 
            <a href="#">Selección</a>
            <a href="            
            <a href="#">Bebidas</a>
        </nav>
    </div>

    <div class="productos">
        <div class="producto">
            <img src="imagen1.jpg" alt="Chifrijo Criollo de la Granja">
            <h3>Chifrijo Criollo de la Granja</h3>
            <p class="precio">CRC 6,500.00</p>
            <button class="boton-carrito">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagen2.jpg" alt="Vigorón Criollo Mixto">
            <h3>Vigorón Criollo Mixto</h3>
            <p class="precio">CRC 6,500.00</p>
            <button class="boton-carrito">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagen3.jpg" alt="Chifrijo">
            <h3>Chifrijo</h3>

            <button class="boton-carrito">Agregar al carrito</button>
        </div>
    </div>

</html>
